name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues and this has not been requested before
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Which area does this affect?
      options:
        - Scripts API (ha.*)
        - Add-on UI (dashboard / editor)
        - Add-on configuration / options
        - History helpers (ha.history)
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case. What can't you do today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work? Code examples are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered (optional)
      description: What workarounds do you use today?

  - type: textarea
    id: additional
    attributes:
      label: Additional context (optional)
