name: Bug Report
description: Something is not working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I have the JS Automations Integration installed (required for native entities)
          required: false

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Scripts API (ha.*)
        - Add-on UI (dashboard / editor)
        - Add-on configuration / options
        - HA Integration
        - MQTT (ha.mqtt)
        - History helpers (ha.history)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste log excerpts from the add-on "Logs" tab. Remove sensitive data.
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - Add-on version:
        - HA version:
        - Browser (if UI bug):
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots (optional)
