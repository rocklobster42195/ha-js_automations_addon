<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>JS Automations</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Scripts -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/i18next/23.10.0/i18next.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/i18next-http-backend/2.5.0/i18nextHttpBackend.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
</head>

<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="brand">
                    <i class="mdi mdi-nodejs"></i>
                    <span data-i18n="header_title">JS AUTOMATIONS</span>
                </div>
                <div class="header-actions">
                    <button id="btn-store-explorer" class="hidden" onclick="openStoreTab()" title="Global Store Explorer"><i class="mdi mdi-database-search"></i></button>
                    <button onclick="createNewScript()" data-i18n="new_script_title" data-i18n-title title="New Script"><i class="mdi mdi-plus"></i></button>
                    <button onclick="loadScripts()" data-i18n="refresh_list_title" data-i18n-title title="Refresh List"><i class="mdi mdi-refresh"></i></button>
                </div>
            </div>

            <div class="search-box">
                <div class="search-container">
                    <input type="text" id="search-input" data-i18n="search_placeholder" data-i18n-placeholder placeholder="Suchen..." oninput="filterScripts()">
                    <button id="clear-search-btn" class="hidden" onclick="clearSearch()"><i class="mdi mdi-close"></i></button>
                </div>
            </div>

            <div id="script-list" class="script-list">
                <!-- Scripts will be injected here -->
            </div>
        </aside>

        <main class="main-content">
            <div id="editor-section" class="hidden">
                <div id="tab-bar"></div>
                
                <!-- EDITOR VIEW -->
                <div id="editor-wrapper" style="display:flex; flex-direction:column; flex:1; min-height:0;">
                    <div class="editor-toolbar">
                        <div class="toolbar-left">
                            <button id="btn-script-toggle" onclick="toggleActiveScript()" data-i18n="script_action_toggle_title" data-i18n-title title="Start / Stop"><i class="mdi mdi-play"></i></button>
                            <button id="btn-script-restart" onclick="restartActiveScript()" data-i18n="script_action_restart_title" data-i18n-title title="Neustart"><i class="mdi mdi-restart"></i></button>
                            <div class="toolbar-separator"></div>
                            <button class="btn-save" onclick="saveActiveTab()" data-i18n="save_title" data-i18n-title title="Speichern"><i class="mdi mdi-content-save"></i></button>
                            <button id="btn-script-edit" onclick="editActiveScript()" title="Edit Metadata"><i class="mdi mdi-pencil"></i></button>
                            <button id="btn-script-duplicate" onclick="duplicateActiveScript()" data-i18n="script_action_duplicate_title" data-i18n-title title="Duplizieren"><i class="mdi mdi-content-duplicate"></i></button>
                            <button id="btn-script-delete" onclick="deleteActiveScript()" data-i18n="script_action_delete_title" data-i18n-title title="Löschen"><i class="mdi mdi-delete-outline"></i></button>
                            <button id="btn-word-wrap" onclick="toggleWordWrap()" data-i18n="toggle_word_wrap_title" data-i18n-title title="Zeilenumbruch umschalten"><i class="mdi mdi-wrap-disabled"></i></button>
                            <div class="toolbar-separator"></div>
                            <!-- Snippet Buttons -->
                            <button onclick="insertCodeSnippet('log')" data-i18n="snippet_log" data-i18n-title title="Log Output"><i class="mdi mdi-console"></i></button>
                            <button onclick="insertCodeSnippet('service')" data-i18n="snippet_service" data-i18n-title title="Call Service"><i class="mdi mdi-flash"></i></button>
                            <button onclick="insertCodeSnippet('listener')" data-i18n="snippet_listener" data-i18n-title title="Event Listener"><i class="mdi mdi-ear-hearing"></i></button>
                            <button onclick="insertCodeSnippet('listener_array')" data-i18n="snippet_listener_array" data-i18n-title title="Event Listener (Array/Liste)"><i class="mdi mdi-playlist-plus"></i></button>
                            <button onclick="insertCodeSnippet('on_stop')" data-i18n="snippet_on_stop" data-i18n-title title="On Script Stop (Cleanup)"><i class="mdi mdi-stop-circle-outline"></i></button>
                            
                            <div class="toolbar-separator"></div>
                            
                            <button onclick="insertCodeSnippet('state')" data-i18n="snippet_state" data-i18n-title title="Get State"><i class="mdi mdi-eye"></i></button>
                            <button onclick="insertCodeSnippet('update_state')" data-i18n="snippet_update_state" data-i18n-title title="Update/Create State"><i class="mdi mdi-pencil"></i></button>
                            <button onclick="insertCodeSnippet('select')" data-i18n="snippet_select" data-i18n-title title="Select Multiple (Bulk Action)"><i class="mdi mdi-checkbox-multiple-marked"></i></button>
                            
                            <div class="toolbar-separator"></div>
                            
                            <button onclick="insertCodeSnippet('store_set')" data-i18n="snippet_store_set" data-i18n-title title="Store: Wert speichern"><i class="mdi mdi-database-edit"></i></button>
                            <button onclick="insertCodeSnippet('store_get')" data-i18n="snippet_store_get" data-i18n-title title="Store: Wert lesen"><i class="mdi mdi-database-search"></i></button>
                            <button onclick="insertCodeSnippet('store_del')" data-i18n="snippet_store_del" data-i18n-title title="Store: Wert löschen"><i class="mdi mdi-database-remove"></i></button>
                        </div>
                        <div class="toolbar-right">
                            <button onclick="closeAllTabs()" data-i18n="close_all_tabs_title" data-i18n-title title="Alle Tabs schließen"><i class="mdi mdi-close-box-multiple"></i></button>
                        </div>
                    </div>
                    <div id="monaco-container"></div>
                </div>

                <!-- STORE VIEW -->
                <div id="store-wrapper" class="hidden">
                    <div class="store-toolbar">
                        <h4>Global Store (ha.store)</h4>
                        <div class="store-search-box">
                            <input type="text" id="store-search" class="store-search-input" placeholder="Filter..." oninput="renderStoreTable()">
                            <button id="store-search-clear" class="hidden" onclick="clearStoreSearch()"><i class="mdi mdi-close"></i></button>
                        </div>
                        <button onclick="clearStore()" title="Clear All (Delete everything)" style="color:var(--danger)"><i class="mdi mdi-delete-alert"></i></button>
                        <button onclick="loadStoreData()" title="Refresh"><i class="mdi mdi-refresh"></i></button>
                    </div>
                    <div class="store-content">
                        <table class="store-table">
                            <thead><tr><th>Key</th><th>Value</th><th>Owner</th><th>Updated</th><th>Accessed</th><th></th></tr></thead>
                            <tbody id="store-table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="resizer"></div>

            <div class="log-section">
                <div class="log-header">
                    <div style="display:flex; align-items:center; gap:20px;">
                        <span data-i18n="log_header">LOGS</span>
                        <div style="display:flex; align-items:center; gap:8px;">
                            <span data-i18n="log_filter_label" style="font-size:0.8rem; opacity:0.7;">Filter:</span>
                            <select id="logFilter" onchange="filterLogs()" style="background:#333; color:#fff; border:1px solid #555; border-radius:3px; padding:2px 5px; font-size:0.8rem;">
                                <option value="ALL" data-i18n="log_filter_all">All</option>
                                <option value="System">System</option>
                            </select>
                        </div>
                    </div>
                    <div style="display:flex; gap:5px;">
                        <button onclick="clearLogView()" data-i18n="log_clear_view_title" data-i18n-title title="Clear View">
                            <i class="mdi mdi-trash-can-outline"></i>
                        </button>
                        <button id="btn-clear-server-logs" class="hidden" onclick="clearServerLogs()" data-i18n="log_clear_server_title" data-i18n-title title="Delete Server Logs">
                            <i class="mdi mdi-delete-forever"></i>
                        </button>
                    </div>
                </div>
                <div id="console-output" class="console"></div>
            </div>
        </main>
    </div>

    <!-- Modal for New Script -->
    <div id="new-script-modal" class="modal-overlay hidden">
        <div class="modal">
            <h3 data-i18n="modal_new_automation_title">Neue Automation</h3>

            <div class="form-grid">
                <div class="form-group">
                    <label data-i18n="script_name">Name</label>
                    <input type="text" id="new-script-name" data-i18n="script_name" data-i18n-placeholder placeholder="Name" oninput="checkScriptName()" autocomplete="off">
                </div>
                <div class="form-group">
    <label data-i18n="script_icon">Icon</label>
    <div class="icon-input-container">
        <!-- Live Vorschau Links -->
        <i id="modal-icon-preview" class="mdi mdi-script-text"></i>
        
        <!-- Input mit Datalist verknüpft -->
        <input type="text" id="new-script-icon" value="mdi:script-text" 
               list="mdi-suggestions" 
               oninput="updateIconPreview('modal-icon-preview', this.value)" 
               placeholder="mdi:...">
    </div>
    
    <!-- "IntelliSense" Light: Die häufigsten Icons -->
    <datalist id="mdi-suggestions">
    </datalist>
</div>
                <div class="form-group">
                    <label data-i18n="script_area">Bereich (Area)</label>
                    <select id="new-script-area">
                        <option value="" data-i18n="area_none">Kein Bereich</option>
                    </select>
                </div>
                <div class="form-group">
                    <label data-i18n="script_label">Label</label>
                    <select id="new-script-label">
                        <option value="" data-i18n="label_none">Kein Label</option>
                    </select>
                </div>
                <div class="form-group">
        <label data-i18n="script_log_level">Log Level</label>
        <select id="new-script-loglevel">
            <option value="debug" data-i18n="log_level_debug">Debug (Alles)</option>
            <option value="info" selected data-i18n="log_level_info">Info (Standard)</option>
            <option value="warn" data-i18n="log_level_warn">Warnungen</option>
            <option value="error" data-i18n="log_level_error">Nur Fehler</option>
        </select>
    </div>
                <div class="form-group full-width">
                    <label data-i18n="script_description">Beschreibung</label>
                    <textarea id="new-script-desc" data-i18n="description_placeholder" data-i18n-placeholder placeholder="Kurze Beschreibung..."></textarea>
                </div>
                <div class="form-group full-width">
                    <label data-i18n="npm_packages">NPM Packages</label>
                    <div class="npm-tags-input" onclick="document.getElementById('npm-input').focus()">
                        <div id="npm-tags-container"></div>
                        <input type="text" id="npm-input" class="npm-input-field" data-i18n="npm_packages_placeholder" data-i18n-placeholder placeholder="Add package..." onkeydown="handleNpmInput(event)">
                    </div>
                </div>
            </div>

            <div class="modal-btns">
                <!-- Error Message (Left side of footer) -->
                <div id="modal-error-msg" class="modal-error"></div>
                <button class="btn-text" onclick="closeModal()" data-i18n="button_cancel">ABBRECHEN</button>
                <button class="btn-primary" onclick="submitNewScript()" data-i18n="button_create">ERSTELLEN</button>
            </div>
        </div>
    </div>

    <!-- Modal for Entity Picker -->
    <div id="entity-picker-modal" class="modal-overlay hidden">
        <div class="modal" style="height: 80vh; display: flex; flex-direction: column;">
            <h3 data-i18n="modal_insert_entity_title">Entity einfügen</h3>
            <div class="search-box" style="border:none; padding: 0 0 10px 0;">
                <div class="search-container">
                    <input type="text" id="entity-search-input" data-i18n="entity_search_placeholder" data-i18n-placeholder placeholder="Entity suchen..." oninput="filterEntityPicker()" autocomplete="off">
                </div>
            </div>
            <div id="entity-list" class="entity-list"></div>
            <div class="modal-btns">
                <button class="btn-text" onclick="closeEntityPicker()" data-i18n="button_cancel">ABBRECHEN</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/editor-config.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/tab-manager.js"></script>
    <script src="js/script-list.js"></script>
    <script src="js/log-viewer.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/socket-client.js"></script>
    <script src="js/app.js"></script>
    <script src="js/store-explorer.js"></script>
</body>

</html>
