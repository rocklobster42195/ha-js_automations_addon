<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>JS Automations</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Scripts -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
</head>

<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="brand">
                    <i class="mdi mdi-nodejs"></i>
                    <span>JS AUTOMATIONS</span>
                </div>
                <div class="header-actions">
                    <button onclick="createNewScript()" title="New Script"><i class="mdi mdi-plus"></i></button>
                    <button onclick="loadScripts()" title="Refresh List"><i class="mdi mdi-refresh"></i></button>
                </div>
            </div>

            <div class="search-box">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Suchen..." oninput="filterScripts()">
                    <button id="clear-search-btn" class="hidden" onclick="clearSearch()"><i class="mdi mdi-close"></i></button>
                </div>
            </div>

            <div id="script-list" class="script-list">
                <!-- Scripts will be injected here -->
            </div>
        </aside>

        <main class="main-content">
            <div id="editor-section" class="hidden">
                <div id="tab-bar"></div>
                <div class="editor-toolbar">
                     <!-- NEUER WRAPPER FÜR LINKS -->
    <div class="editor-info">
        <i id="editor-icon" class="mdi mdi-script-text"></i>
        <span id="editor-title">datei.js</span>
    </div>

    <!-- RECHTE SEITE (Buttons) -->
    <div class="toolbar-btns">
        <button class="btn-save" onclick="saveActiveTab()">SPEICHERN</button>
        <button class="btn-close" onclick="closeAllTabs()"><i class="mdi mdi-close"></i></button>
    </div>
                </div>
                <div id="monaco-container"></div>
            </div>

            <div class="log-section">
                <div class="log-header">
                    <span>PROTOKOLL</span>
                    <button onclick="document.getElementById('console-output').innerHTML=''" title="Clear Logs">
                        <i class="mdi mdi-delete-sweep"></i>
                    </button>
                </div>
                <div id="console-output" class="console"></div>
            </div>
        </main>
    </div>

    <!-- Modal for New Script -->
    <div id="new-script-modal" class="modal-overlay hidden">
        <div class="modal">
            <h3>Neue Automation</h3>

            <div class="form-grid">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="new-script-name" placeholder="Name">
                </div>
                <div class="form-group">
    <label>Icon</label>
    <div class="icon-input-container">
        <!-- Live Vorschau Links -->
        <i id="modal-icon-preview" class="mdi mdi-script-text"></i>
        
        <!-- Input mit Datalist verknüpft -->
        <input type="text" id="new-script-icon" value="mdi:script-text" 
               list="mdi-suggestions" 
               oninput="updateModalIconPreview()" 
               placeholder="mdi:...">
    </div>
    
    <!-- "IntelliSense" Light: Die häufigsten Icons -->
    <datalist id="mdi-suggestions">
        <option value="mdi:script-text">
        <option value="mdi:home-automation">
        <option value="mdi:lightbulb">
        <option value="mdi:power-plug">
        <option value="mdi:thermometer">
        <option value="mdi:weather-sunny">
        <option value="mdi:motion-sensor">
        <option value="mdi:battery">
        <option value="mdi:wifi">
        <option value="mdi:network">
        <option value="mdi:server">
        <option value="mdi:robot">
        <option value="mdi:clock-outline">
        <option value="mdi:alert-circle">
        <option value="mdi:check-circle">
        <option value="mdi:play">
        <option value="mdi:stop">
        <option value="mdi:restart">
        <option value="mdi:blinds">
        <option value="mdi:fan">
        <option value="mdi:lock">
        <option value="mdi:door">
        <option value="mdi:garage">
    </datalist>
</div>
                <div class="form-group">
                    <label>Bereich (Area)</label>
                    <select id="new-script-area">
                        <option value="">Kein Bereich</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Label</label>
                    <select id="new-script-label">
                        <option value="">Kein Label</option>
                    </select>
                </div>
                <div class="form-group">
        <label>Log Level</label>
        <select id="new-script-loglevel">
            <option value="debug">Debug (Alles)</option>
            <option value="info" selected>Info (Standard)</option>
            <option value="warn">Warnungen</option>
            <option value="error">Nur Fehler</option>
        </select>
    </div>
                <div class="form-group full-width">
                    <label>Beschreibung</label>
                    <textarea id="new-script-desc" placeholder="Kurze Beschreibung..."></textarea>
                </div>
            </div>

            <div class="modal-btns">
                <button class="btn-text" onclick="closeModal()">ABBRECHEN</button>
                <button class="btn-primary" onclick="submitNewScript()">ERSTELLEN</button>
            </div>
        </div>
    </div>


    <script src="app.js"></script>
</body>

</html>
