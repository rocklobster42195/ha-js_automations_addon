<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>JS Automations</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Scripts -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
</head>

<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="brand">
                    <i class="mdi mdi-nodejs"></i>
                    <span>JS AUTOMATIONS</span>
                </div>
                <div class="header-actions">
                    <button onclick="createNewScript()" title="New Script"><i class="mdi mdi-plus"></i></button>
                    <button onclick="loadScripts()" title="Refresh List"><i class="mdi mdi-refresh"></i></button>
                </div>
            </div>

            <div class="search-box">
                <input type="text" id="search-input" placeholder="Suchen..." oninput="filterScripts()">
            </div>

            <div id="script-list" class="script-list">
                <!-- Scripts will be injected here -->
            </div>
        </aside>

        <main class="main-content">
            <div id="editor-section" class="hidden">
                <div class="editor-toolbar">
                    <span id="editor-title"></span>
                    <div class="toolbar-btns">
                        <button class="btn-save" onclick="saveCurrentScript()">SPEICHERN</button>
                        <button class="btn-close" onclick="closeEditor()"><i class="mdi mdi-close"></i></button>
                    </div>
                </div>
                <div id="monaco-container"></div>
            </div>

            <div class="log-section">
                <div class="log-header">
                    <span>PROTOKOLL</span>
                    <button onclick="document.getElementById('console-output').innerHTML=''" title="Clear Logs">
                        <i class="mdi mdi-delete-sweep"></i>
                    </button>
                </div>
                <div id="console-output" class="console"></div>
            </div>
        </main>
    </div>

    <!-- Modal for New Script -->
    <div id="new-script-modal" class="modal-overlay hidden" style="display:none;">
        <div class="modal">
            <h3>Neue Automation</h3>

            <div class="form-grid">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="new-script-name" placeholder="Name">
                </div>
                <div class="form-group">
                    <label>Icon</label>
                    <input type="text" id="new-script-icon" value="mdi:script-text">
                </div>
                <div class="form-group">
                    <label>Bereich (Area)</label>
                    <select id="new-script-area">
                        <option value="">Kein Bereich</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Label</label>
                    <select id="new-script-label">
                        <option value="">Kein Label</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label>Beschreibung</label>
                    <textarea id="new-script-desc" placeholder="Kurze Beschreibung..."></textarea>
                </div>
            </div>

            <div class="modal-btns">
                <button class="btn-text" onclick="closeModal()">ABBRECHEN</button>
                <button class="btn-primary" onclick="submitNewScript()">ERSTELLEN</button>
            </div>
        </div>
    </div>


    <script src="app.js"></script>
</body>

</html>
