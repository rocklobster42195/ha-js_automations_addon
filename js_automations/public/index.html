<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Automations</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Scripts -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/i18next/23.10.0/i18next.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/i18next-http-backend/2.5.0/i18nextHttpBackend.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
</head>

<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="brand">
                    <i class="mdi mdi-robot-happy-outline nav-logo"></i>
                    <span data-i18n="header_title">JS AUTOMATIONS</span>
                    <span id="app-version" class="version-tag"></span>
                </div>
                <div class="header-actions">
                    <button onclick="openCreationWizard()" data-i18n="new_script_title" data-i18n-title title="New Script"><i class="mdi mdi-plus"></i></button>
                    <button id="btn-store-explorer" class="hidden" onclick="openStoreTab()" data-i18n="global_store_explorer_title" data-i18n-title title="Global Store Explorer"><i class="mdi mdi-database-search"></i></button>
                    <button id="btn-settings" onclick="openSettingsTab()" data-i18n="settings_button_title" data-i18n-title title="Settings"><i class="mdi mdi-cog"></i></button>
                    <button id="btn-reference" onclick="openReferenceTab()" title="Command Reference" class="hidden"><i class="mdi mdi-help-circle-outline"></i></button>
                </div>
            </div>

            <div class="search-box">
                <div class="search-container">
                    <input type="text" id="search-input" data-i18n="search_placeholder" data-i18n-placeholder placeholder="Suchen..." oninput="filterScripts()">
                    <button id="clear-search-btn" class="hidden" onclick="clearSearch()" title="Clear search"><i class="mdi mdi-close"></i></button>
                </div>
            </div>

            <div id="script-list" class="script-list">
                <!-- Scripts will be injected here -->
            </div>

            <div id="status-bar" class="sidebar-footer">
                <div class="status-left">
                    <div class="stat-item" title="Backend Heartbeat">
                        <i id="heartbeat-icon" class="mdi mdi-circle-outline heartbeat-icon"></i>
                    </div>
                    <div id="integration-status-item" class="stat-item" title="MQTT Status" onclick="openSettingsTab('mqtt')" style="cursor:pointer">
                        <i id="integration-status-icon" class="mdi mdi-circle-outline integration-icon"></i>
                    </div>
                </div>
                <div class="status-slots">
                    <div id="sb-slot1" class="sb-item"></div>
                    <div id="sb-slot2" class="sb-item"></div>
                    <div id="sb-slot3" class="sb-item"></div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div id="editor-section" class="hidden">
                <div id="tab-bar"></div>
                
                <!-- EDITOR VIEW -->
                <div id="editor-wrapper" style="display:flex; flex-direction:column; flex:1; min-height:0;">
                    <div class="editor-toolbar">
                        <div class="toolbar-left">
                            <button id="btn-script-toggle" onclick="toggleActiveScript()" data-i18n="script_action_toggle_title" data-i18n-title title="Start / Stop"><i class="mdi mdi-play"></i></button>
                            <button id="btn-script-restart" onclick="restartActiveScript()" data-i18n="script_action_restart_title" data-i18n-title title="Neustart"><i class="mdi mdi-restart"></i></button>
                            <div class="toolbar-separator"></div>
                            <button class="btn-save" onclick="saveActiveTab()" data-i18n="save_title" data-i18n-title title="Speichern"><i class="mdi mdi-content-save"></i></button>
                            <button id="btn-script-edit" onclick="editActiveScript()" title="Edit Metadata"><i class="mdi mdi-pencil"></i></button>
                            <button id="btn-script-download" onclick="downloadActiveScript()" data-i18n="download_script_title" data-i18n-title title="Download Script"><i class="mdi mdi-download"></i></button>
                            <button id="btn-script-duplicate" onclick="duplicateActiveScript()" data-i18n="script_action_duplicate_title" data-i18n-title title="Duplizieren"><i class="mdi mdi-content-duplicate"></i></button>
                            <button id="btn-word-wrap" onclick="toggleWordWrap()" data-i18n="toggle_word_wrap_title" data-i18n-title title="Zeilenumbruch umschalten"><i class="mdi mdi-wrap-disabled"></i></button>
                            <div class="toolbar-separator"></div>
                            <!-- Snippet Buttons -->
                            <button onclick="insertCodeSnippet('log')" data-i18n="snippet_log" data-i18n-title title="Log Output"><i class="mdi mdi-console"></i></button>
                            <button onclick="insertCodeSnippet('service')" data-i18n="snippet_service" data-i18n-title title="Call Service"><i class="mdi mdi-flash"></i></button>
                            <button onclick="insertCodeSnippet('listener')" data-i18n="snippet_listener" data-i18n-title title="Event Listener"><i class="mdi mdi-ear-hearing"></i></button>
                            <button onclick="insertCodeSnippet('listener_array')" data-i18n="snippet_listener_array" data-i18n-title title="Event Listener (Array/Liste)"><i class="mdi mdi-playlist-plus"></i></button>
                            <button onclick="insertCodeSnippet('on_stop')" data-i18n="snippet_on_stop" data-i18n-title title="On Script Stop (Cleanup)"><i class="mdi mdi-stop-circle-outline"></i></button>
                            
                            <div class="toolbar-separator"></div>
                            
                            <button onclick="insertCodeSnippet('register')" data-i18n="snippet_register" data-i18n-title title="Register Entity"><i class="mdi mdi-shape-square-plus"></i></button>
                            <button onclick="insertCodeSnippet('update_state')" data-i18n="snippet_update_state" data-i18n-title title="Update/Create State"><i class="mdi mdi-import"></i></button>
                            <button onclick="insertCodeSnippet('state')" data-i18n="snippet_state" data-i18n-title title="Get State"><i class="mdi mdi-export"></i></button>
                            <button onclick="insertCodeSnippet('select')" data-i18n="snippet_select" data-i18n-title title="Select Multiple (Bulk Action)"><i class="mdi mdi-checkbox-multiple-marked"></i></button>
                            
                            <div class="toolbar-separator"></div>
                            
                            <button onclick="insertCodeSnippet('store_set')" data-i18n="snippet_store_set" data-i18n-title title="Store: Wert speichern"><i class="mdi mdi-database-import"></i></button>
                            <button onclick="insertCodeSnippet('store_get')" data-i18n="snippet_store_get" data-i18n-title title="Store: Wert lesen"><i class="mdi mdi-database-export"></i></button>
                            <button onclick="insertCodeSnippet('store_del')" data-i18n="snippet_store_del" data-i18n-title title="Store: Wert löschen"><i class="mdi mdi-database-remove"></i></button>
                        </div>
                        <div class="toolbar-right">
                            <button onclick="closeAllTabs()" data-i18n="close_all_tabs_title" data-i18n-title title="Alle Tabs schließen"><i class="mdi mdi-close-box-multiple"></i></button>
                        </div>
                    </div>
                    <div id="monaco-container"></div>
                </div>

                <!-- STORE VIEW -->
                <div id="store-wrapper" class="hidden">
                    <div class="store-toolbar">
                        <h4 data-i18n="store.title">Global Store (ha.store)</h4>
                        <div class="store-search-box">
                            <input type="text" id="store-search" class="store-search-input" data-i18n="store.actions.filter_placeholder" data-i18n-placeholder placeholder="Filter..." oninput="renderStoreTable()">
                            <button id="store-search-clear" class="hidden" onclick="clearStoreSearch()" data-i18n="store.actions.clear_filter" data-i18n-title title="Clear filter"><i class="mdi mdi-close"></i></button>
                        </div>
                        <button onclick="clearStore()" data-i18n="store.actions.clear_all" data-i18n-title title="Clear All (Delete everything)" style="color:var(--danger)"><i class="mdi mdi-delete-alert"></i></button>
                        <button onclick="loadStoreData()" data-i18n="store.actions.refresh" data-i18n-title title="Refresh"><i class="mdi mdi-refresh"></i></button>
                    </div>
                    <div class="store-content">
                        <table class="store-table">
                            <thead><tr>
                                <th id="th-store-key" data-i18n="store.headers.key" onclick="sortStore('key')" style="cursor:pointer; user-select:none;">Key</th>
                                <th id="th-store-value" data-i18n="store.headers.value" onclick="sortStore('value')" style="cursor:pointer; user-select:none;">Value</th>
                                <th id="th-store-owner" data-i18n="store.headers.owner" onclick="sortStore('owner')" style="cursor:pointer; user-select:none;">Owner</th>
                                <th id="th-store-updated" data-i18n="store.headers.updated" onclick="sortStore('updated')" style="cursor:pointer; user-select:none;">Updated</th>
                                <th id="th-store-accessed" data-i18n="store.headers.accessed" onclick="sortStore('accessed')" style="cursor:pointer; user-select:none;">Accessed</th>
                                <th></th>
                            </tr></thead>
                            <tbody id="store-table-body"></tbody>
                        </table>
                    </div>
                </div>

                <!-- SETTINGS VIEW -->
                <div id="settings-wrapper" class="hidden" style="display: flex; flex-direction: column; height: 100%; background-color: #1e1e1e;">
                    <div class="settings-header" style="padding: 10px 20px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px;">
                        <h2 style="margin: 0; font-size: 1.2rem; font-weight: 400;"><i class="mdi mdi-cog"></i> <span data-i18n="settings_title">Settings</span></h2>
                        <div style="flex: 1;"></div>
                        <button onclick="closeSettingsTab()" style="background: none; border: none; color: #aaa; cursor: pointer; font-size: 1.2rem;" title="Close"><i class="mdi mdi-close"></i></button>
                    </div>
                    <div class="settings-body" style="display: flex; flex: 1; overflow: hidden;">
                        <!-- Left: Categories -->
                        <div id="settings-categories" style="width: 200px; border-right: 1px solid #333; padding: 10px 0; overflow-y: auto;">
                            <!-- Injected via JS -->
                        </div>
                        <!-- Right: Content -->
                        <div id="settings-content" style="flex: 1; padding: 20px; overflow-y: auto;">
                            <!-- Injected via JS -->
                        </div>
                    </div>
                </div>
            </div>

            <div id="resizer"></div>

            <div class="log-section">
                <div class="log-header">
                    <div style="display:flex; align-items:center; gap:20px;">
                        <span data-i18n="log_header">LOGS</span>
                        <div style="display:flex; align-items:center; gap:8px;">
                            <label for="logFilter" data-i18n="log_filter_label" style="font-size:0.8rem; opacity:0.7;">Filter:</label>
                            <select id="logFilter" onchange="filterLogs()">
                                <option value="ALL" data-i18n="log_filter_all">All</option>
                                <option value="System">System</option>
                            </select>
                        </div>
                    </div>
                    <div style="display:flex; gap:5px;">
                        <button onclick="clearLogView()" data-i18n="log_clear_view_title" data-i18n-title title="Clear View">
                            <i class="mdi mdi-trash-can-outline"></i>
                        </button>
                        <button id="btn-clear-server-logs" class="hidden" onclick="clearServerLogs()" data-i18n="log_clear_server_title" data-i18n-title title="Delete Server Logs">
                            <i class="mdi mdi-delete-forever"></i>
                        </button>
                    </div>
                </div>
                <div id="console-output" class="console"></div>
            </div>
        </main>
    </div>

    <!-- Modal for Entity Picker -->
    <div id="entity-picker-modal" class="modal-overlay hidden">
        <div class="modal" style="height: 80vh; display: flex; flex-direction: column;">
            <h3 data-i18n="modal_insert_entity_title">Entity einfügen</h3>
            <div class="search-box" style="border:none; padding: 0 0 10px 0;">
                <div class="search-container">
                    <input type="text" id="entity-search-input" data-i18n="entity_search_placeholder" data-i18n-placeholder placeholder="Entity suchen..." oninput="filterEntityPicker()" autocomplete="off">
                </div>
            </div>
            <div id="entity-list" class="entity-list"></div>
            <div class="modal-btns">
                <button class="btn-text" onclick="closeEntityPicker()" data-i18n="button_cancel">ABBRECHEN</button>
            </div>
        </div>
    </div>

    <!-- Modal for Settings Entity Picker -->
    <div id="settings-entity-picker-modal" class="modal-overlay hidden">
        <div class="modal" style="height: 80vh; display: flex; flex-direction: column;">
            <h3 data-i18n="modal_select_entity_title">Entity auswählen</h3>
            <div class="search-box" style="border:none; padding: 0 0 10px 0;">
                <div class="search-container">
                    <input type="text" id="settings-entity-search-input" data-i18n="entity_search_placeholder" data-i18n-placeholder placeholder="Entity suchen..." oninput="filterSettingsEntityPicker()" autocomplete="off">
                </div>
            </div>
            <div id="settings-entity-list" class="entity-list"></div>
            <div class="modal-btns">
                <button class="btn-text" onclick="closeSettingsEntityPicker()" data-i18n="button_cancel">ABBRECHEN</button>
            </div>
        </div>
    </div>

    <!-- Connection Lost Overlay -->
    <div id="connection-lost-overlay" class="hidden">
        <div class="reconnect-spinner"></div>
        <h2 style="margin-bottom: 10px;">Verbindung unterbrochen</h2>
        <p style="color: #aaa; margin-bottom: 20px;">Versuche Wiederherstellung...</p>
        <button class="btn-primary" onclick="manualReload()">
            <i class="mdi mdi-reload"></i> Jetzt neu laden
        </button>
    </div>

    <script src="js/api.js"></script>
    <script src="js/editor-config.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/tab-manager.js"></script>
    <script src="js/script-list.js"></script>
    <script src="js/log-viewer.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/socket-client.js"></script>
    <script src="js/app.js"></script>
    <script src="js/store-explorer.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/statusbar.js"></script>
    <script src="js/creation-wizard.js"></script>
    <script src="js/reference.js"></script>
    <script src="js/safe-mode.js"></script>
    <script src="js/integration-banner.js"></script>
</body>

</html>
