<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Automations</title>
<style>
    :root {
        color-scheme: light dark;
        --bg: #f4f5f7;
        --card-bg: #ffffff;
        --text: #1c1e21;
        --muted: #5f6368;
        --accent: #e6a23c;
    }
    @media (prefers-color-scheme: dark) {
        :root {
            --bg: #111318;
            --card-bg: #1c1f26;
            --text: #e8eaed;
            --muted: #9aa0a6;
        }
    }
    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .card {
        max-width: 480px;
        margin: 16px;
        padding: 32px;
        background: var(--card-bg);
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.15);
        text-align: center;
    }
    .icon { font-size: 48px; }
    h1 { font-size: 20px; margin: 16px 0 8px; }
    p { color: var(--muted); line-height: 1.5; margin: 8px 0; }
    .spinner {
        display: inline-block;
        margin-top: 16px;
        width: 20px; height: 20px;
        border: 3px solid var(--muted);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        vertical-align: middle;
    }
    .waiting { color: var(--muted); font-size: 14px; margin-left: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
    <div class="icon">⏸️</div>
    <h1 id="title">Waiting for sibling add-on</h1>
    <p id="msg"></p>
    <p id="hint"></p>
    <div><span class="spinner"></span><span class="waiting" id="waiting">Waiting…</span></div>
</div>
<script>
(async () => {
    const lang = (navigator.language || 'en').toLowerCase().startsWith('de') ? 'de' : 'en';

    let t = {};
    try {
        const res = await fetch('locales/' + lang + '/translation.json');
        t = await res.json();
    } catch (e) { /* fall back to built-in English texts */ }

    let sibling = '';
    const apply = () => {
        const tr = (key, fallback) => (t[key] || fallback).replace('{{sibling}}', sibling);
        document.getElementById('title').textContent = tr('sibling_guard_title', 'Waiting for sibling add-on');
        document.getElementById('msg').textContent = tr('sibling_guard_msg', '"{{sibling}}" is currently running. Both add-ons share the same scripts, data, and webhook port, so they must never run at the same time.');
        document.getElementById('hint').textContent = tr('sibling_guard_hint', 'Stop "{{sibling}}" in the add-on view — this add-on will then activate automatically (checked every 15 seconds).');
        document.getElementById('waiting').textContent = tr('sibling_guard_waiting', 'Waiting…');
    };
    apply();

    // Poll the gate endpoint; once the guard clears (endpoint no longer answers
    // with blocked:true), reload into the real UI.
    setInterval(async () => {
        try {
            const res = await fetch('api/blocked-status');
            const data = res.ok ? await res.json() : null;
            if (!data || data.blocked !== true) {
                location.reload();
                return;
            }
            if (data.siblingName && data.siblingName !== sibling) {
                sibling = data.siblingName;
                apply();
            }
        } catch (e) {
            // Server restarting — reload will pick up whatever comes back.
            location.reload();
        }
    }, 5000);

    // Initial fetch to fill in the sibling name right away.
    try {
        const res = await fetch('api/blocked-status');
        if (res.ok) {
            const data = await res.json();
            if (data.siblingName) { sibling = data.siblingName; apply(); }
        }
    } catch (e) { /* ignore */ }
})();
</script>
</body>
</html>
