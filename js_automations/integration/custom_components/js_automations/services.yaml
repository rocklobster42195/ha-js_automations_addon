create_entity:
  name: Create or Update Entity
  description: Creates a persistent entity in the Entity Registry and sets its state.
  fields:
    entity_id:
      name: Entity ID
      description: The entity ID (e.g., sensor.my_custom_sensor).
      required: true
      selector:
        text:
    unique_id:
      name: Unique ID
      description: A unique identifier for the registry. Must be unique per domain.
      required: true
      selector:
        text:
    state:
      name: State
      description: The state of the entity.
      required: false
      selector:
        text:
    attributes:
      name: Attributes
      description: Dictionary of attributes.
      required: false
      selector:
        object:
    name:
      name: Friendly Name
      description: The friendly name of the entity.
      required: false
      selector:
        text:
    icon:
      name: Icon
      description: The icon (e.g., mdi:flash).
      required: false
      selector:
        icon:
remove_entity:
  name: Remove Entity
  description: Removes an entity from the Entity Registry. Provide at least one identifier.
  fields:
    unique_id:
      name: Unique ID
      description: The unique ID of the entity to remove.
      required: false
      selector:
        text:
    entity_id:
      name: Entity ID
      description: The entity ID of the entity to remove.
      required: false
      selector:
        entity:
remove_device:
  name: Remove Device
  description: Removes a device from the Device Registry.
  fields:
    identifiers:
      name: Identifiers
      description: A list of identifiers for the device (e.g., ["js_automations_test"]).
      required: true
      selector:
        object: